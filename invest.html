<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invest Smart | Make Investment</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#f5f7fb;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.invest-form-container{
    background:#fff;
    width:100%;
    max-width:450px;
    padding:35px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,.15);
}

.invest-form-container h2{
    text-align:center;
    color:#4facfe;
    margin-bottom:25px;
}

select,
input{
    width:100%;
    padding:14px;
    margin-bottom:15px;
    border:1px solid #ccc;
    border-radius:50px;
    outline:none;
    font-size:15px;
}

select:focus,
input:focus{
    border-color:#4facfe;
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:50px;
    background:#4facfe;
    color:#fff;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    background:#00d4ff;
}

/* Overlay */

.overlay{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,.5);
    display:none;
    z-index:999;
}

/* Payment Popup */

.popup{
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    width:90%;
    max-width:450px;
    background:white;
    padding:30px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,.3);
    display:none;
    z-index:1000;
    text-align:center;
}

.popup h3{
    color:#4facfe;
    margin-bottom:15px;
}

.popup textarea{
    width:100%;
    height:120px;
    margin:15px 0;
    padding:12px;
    border:1px solid #ccc;
    border-radius:12px;
    resize:none;
    outline:none;
}

.popup textarea:focus{
    border-color:#4facfe;
}

.popup button{
    margin-top:10px;
}

/* Success Popup */

.success-popup{
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    background:white;
    width:90%;
    max-width:400px;
    padding:30px;
    border-radius:20px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,.3);
    z-index:3000;
}

.success-popup h2{
    color:green;
    margin-bottom:15px;
}

.success-popup p{
    margin-bottom:20px;
}

/* Alert */

.custom-alert{
    position:fixed;
    top:20px;
    left:50%;
    transform:translateX(-50%);
    background:#ff4d4d;
    color:white;
    padding:15px 25px;
    border-radius:12px;
    z-index:5000;
    font-weight:600;
    box-shadow:0 5px 15px rgba(0,0,0,.2);
}

</style>
</head>

<body>

<div class="invest-form-container">

    <h2>Make an Investment</h2>

    <select id="plan">
        <option value="">Select Investment Plan</option>
        <option value="500">Starter Plan - KES 500</option>
        <option value="1000">Bronze Plan - KES 1,000</option>
        <option value="5000">Silver Plan - KES 5,000</option>
        <option value="10000">Gold Plan - KES 10,000</option>
    </select>

    <input
        type="number"
        id="amount"
        placeholder="Enter investment amount">

    <input
        type="tel"
        id="phone"
        placeholder="Enter phone number">

    <button id="invest-btn">
        Invest
    </button>

</div>

<!-- Overlay -->

<div class="overlay" id="overlay"></div>

<!-- Payment Popup -->

<div class="popup" id="popup">

    <h3>Complete Payment</h3>

    <p>Pay to the following M-Pesa Number:</p>

    <h2 style="color:#00aaff;margin:15px 0;">
        0740919923
    </h2>

    <textarea
        id="mpesa-message"
        placeholder="Paste your M-Pesa confirmation message here..."></textarea>

    <button id="submit-payment">
        Submit
    </button>

</div>

<script>

const investBtn = document.getElementById('invest-btn');
const popup = document.getElementById('popup');
const overlay = document.getElementById('overlay');
const submitPayment = document.getElementById('submit-payment');

investBtn.addEventListener('click', () => {

    const amount =
        document.getElementById('amount').value.trim();

    const phone =
        document.getElementById('phone').value.trim();

    const plan =
        document.getElementById('plan').value;

    if(plan === '' || amount === '' || phone === ''){
        showCustomAlert('Please fill in all fields.');
        return;
    }

    /* Exactly 10 digits */

    if(!/^\d{10}$/.test(phone)){
        showCustomAlert(
            'Phone number must contain exactly 10 digits.'
        );
        return;
    }

    /* Amount matches plan */

    if(amount !== plan){
        showCustomAlert(
            'Investment amount must match the selected plan.'
        );
        return;
    }

    overlay.style.display = 'block';
    popup.style.display = 'block';
});

submitPayment.addEventListener('click', () => {

    const message =
        document.getElementById('mpesa-message')
        .value
        .trim();

    if(message === ''){
        showCustomAlert(
            'Please paste your M-Pesa confirmation message.'
        );
        return;
    }

    /* Simple M-Pesa Validation */

    const mpesaPattern =
        /(confirmed|mpesa|m-pesa|transaction|balance|received)/i;

    if(!mpesaPattern.test(message)){
        showCustomAlert(
            'Invalid M-Pesa message detected.'
        );
        return;
    }

    popup.style.display = 'none';
    overlay.style.display = 'none';

    showSuccessPopup();

});

function showSuccessPopup(){

    const success =
        document.createElement('div');

    success.classList.add('success-popup');

    success.innerHTML = `
        <h2>✅ Investment Made Successfully</h2>

        <p>
            Your investment has been submitted successfully.
            Verification is now in progress.
        </p>

        <button id="success-close">
            OK
        </button>
    `;

    document.body.appendChild(success);

    document
        .getElementById('success-close')
        .addEventListener('click', () => {

            success.remove();

            document.getElementById('plan').value = '';
            document.getElementById('amount').value = '';
            document.getElementById('phone').value = '';
            document.getElementById('mpesa-message').value = '';

        });
}

function showCustomAlert(message){

    const alertBox =
        document.createElement('div');

    alertBox.classList.add('custom-alert');

    alertBox.innerText = message;

    document.body.appendChild(alertBox);

    setTimeout(() => {
        alertBox.remove();
    },3000);
}

</script>

</body>
</html>
