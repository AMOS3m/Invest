<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invest Smart | Make Investment</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<style>
    * { box-sizing: border-box; margin:0; padding:0; font-family:'Poppins', sans-serif; }

    body {
        background: #f5f7fb;
        color: #333;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
    }

    .invest-form-container {
        background: white;
        padding: 40px 30px;
        border-radius: 15px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        max-width: 400px;
        width: 100%;
        text-align: center;
    }

    .invest-form-container h2 {
        color: #4facfe;
        margin-bottom: 20px;
        font-size: 2rem;
    }

    .invest-form-container input {
        width: 100%;
        padding: 12px 15px;
        margin-bottom: 15px;
        border-radius: 50px;
        border: 1px solid #ccc;
        font-size: 1rem;
        outline: none;
    }

    .invest-form-container input:focus {
        border-color: #4facfe;
    }

    .invest-form-container button {
        padding: 12px 20px;
        background: #4facfe;
        color: white;
        border: none;
        border-radius: 50px;
        cursor: pointer;
        font-size: 1.1rem;
        font-weight: 600;
        transition: 0.3s;
        width: 100%;
    }

    .invest-form-container button:hover {
        background: #00f2fe;
    }

    .confirmation {
        margin-top: 20px;
        font-size: 1.1rem;
        color: green;
        display: none;
    }
</style>
</head>
<body>

<div class="invest-form-container">
    <h2>Make an Investment</h2>
    <input type="number" id="amount" placeholder="Enter investment amount" required>
    <input type="tel" id="phone" placeholder="Enter phone number" required>
    <button id="invest-btn">Invest</button>
    <div class="confirmation" id="confirmation-msg"></div>
</div>

<script>
    const investBtn = document.getElementById('invest-btn');
    const confirmationMsg = document.getElementById('confirmation-msg');

    investBtn.addEventListener('click', () => {
        const amount = document.getElementById('amount').value.trim();
        const phone = document.getElementById('phone').value.trim();

        // Check if fields are empty
        if(amount === '' || phone === ''){
            alert('Please fill in all fields.');
            return;
        }

        // Validate phone number length
        if(phone.length !== 10 || !/^\d+$/.test(phone)){
            alert('Phone number must be exactly 10 digits.');
            return;
        }

        // Send POST request to backend
        fetch('/api/invest', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ amount, phone })
        })
        .then(res => res.json())
        .then(data => {
            confirmationMsg.style.display = 'block';
            confirmationMsg.innerHTML = data.message;

            // Clear inputs
            document.getElementById('amount').value = '';
            document.getElementById('phone').value = '';
        })
        .catch(err => {
            console.error(err);
            alert('Error processing investment.');
        });
    });
</script>

</body>
</html>
