<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invest Smart | Grow Your Wealth</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{
    box-sizing:border-box;
    margin:0;
    padding:0;
    font-family:'Poppins',sans-serif;
}

body{
    background:linear-gradient(135deg,#4facfe,#00f2fe);
    color:#333;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:20px 0;
}

/* CUSTOM ALERT */
.custom-alert{
    position:fixed;
    top:20px;
    right:20px;
    background:white;
    color:#333;
    padding:15px 20px;
    border-radius:12px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
    display:none;
    z-index:999;
    animation:slideIn 0.3s ease;
    font-weight:500;
}

.custom-alert.show{
    display:block;
}

@keyframes slideIn{
    from{
        opacity:0;
        transform:translateY(-20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

/* HOME BUTTON */
.top-bar{
    width:100%;
    display:flex;
    justify-content:flex-end;
    padding:0 25px;
    margin-bottom:10px;
}

.home-btn{
    background:white;
    color:#4facfe;
    padding:10px 20px;
    border-radius:50px;
    text-decoration:none;
    font-weight:600;
    transition:0.3s;
}

.home-btn:hover{
    background:#00f2fe;
    color:white;
}

header{
    text-align:center;
    margin-bottom:40px;
    color:white;
}

header h1{
    font-size:3rem;
    margin-bottom:10px;
}

header p{
    font-size:1.2rem;
    font-weight:300;
}

.container{
    background:white;
    border-radius:15px;
    padding:40px 30px;
    max-width:400px;
    width:90%;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
    margin-bottom:30px;
}

.form-toggle{
    display:flex;
    justify-content:space-around;
    margin-bottom:30px;
}

.form-toggle button{
    padding:10px 20px;
    border:none;
    background:#eee;
    border-radius:50px;
    cursor:pointer;
    font-weight:600;
    transition:0.3s;
}

.form-toggle button.active{
    background:#4facfe;
    color:white;
}

form{
    display:none;
    flex-direction:column;
}

form.active{
    display:flex;
}

input,select{
    padding:12px 15px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:50px;
    outline:none;
    transition:0.3s;
}

input:focus,
select:focus{
    border-color:#4facfe;
}

button.submit{
    padding:12px;
    background:#4facfe;
    color:white;
    border:none;
    border-radius:50px;
    cursor:pointer;
    font-weight:600;
    margin-top:15px;
    transition:0.3s;
}

button.submit:hover{
    background:#00f2fe;
}

.plans{
    background:white;
    border-radius:15px;
    padding:30px 25px;
    max-width:400px;
    width:90%;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
    margin-bottom:30px;
}

.plans h2{
    text-align:center;
    margin-bottom:20px;
    color:#4facfe;
}

.plans div{
    margin:15px 0;
}

.plans label{
    display:block;
    margin-bottom:5px;
    font-weight:500;
}

.return-result{
    text-align:center;
    margin-top:15px;
    font-size:1.2rem;
    font-weight:600;
    color:#00aaff;
}

.footer{
    color:white;
    text-align:center;
    font-size:0.9rem;
}

@media(max-width:500px){
    header h1{
        font-size:2.2rem;
    }

    .container,
    .plans{
        padding:30px 20px;
    }
}
</style>
</head>

<body>

<!-- CUSTOM ALERT -->
<div class="custom-alert" id="custom-alert"></div>

<!-- HOME BUTTON -->
<div class="top-bar">
    <a href="index.html" class="home-btn">Home</a>
</div>

<header>
    <h1>Invest Smart</h1>
    <p>Your journey to smarter investments starts here</p>
</header>

<div class="container">

    <div class="form-toggle">
        <button id="login-btn" class="active">Login</button>
        <button id="register-btn">Register</button>
    </div>

    <!-- LOGIN FORM -->
    <form id="login-form" class="active">
        <input type="email" id="login-email" placeholder="Email" required>
        <input type="password" id="login-password" placeholder="Password" required>

        <button type="submit" class="submit">Login</button>
    </form>

    <!-- REGISTER FORM -->
    <form id="register-form">
        <input type="text" id="register-name" placeholder="Full Name" required>
        <input type="email" id="register-email" placeholder="Email" required>
        <input type="password" id="register-password" placeholder="Password" required>

        <button type="submit" class="submit">Register</button>
    </form>

</div>

<!-- INVESTMENT PLANS -->
<div class="plans">

    <h2>Investment Plans</h2>

    <div>
        <label for="plan">Select a Plan:</label>

        <select id="plan">
            <option value="">-- Choose a Plan --</option>
            <option value="30">30% after 2 weeks (500-1000)</option>
            <option value="25">25% after 1 month (2000-10000)</option>
            <option value="20">20% above 2 months (10000+)</option>
        </select>
    </div>

    <div>
        <label for="amount">Investment Amount:</label>
        <input type="number" id="amount" placeholder="Enter amount">
    </div>

    <button class="submit" onclick="calculateReturn()">Calculate Return</button>

    <div class="return-result" id="return-result"></div>

</div>

<div class="footer">
    &copy; 2026 Invest Smart. All Rights Reserved.
</div>

<script>

// CUSTOM ALERT FUNCTION
function showAlert(message){
    const alertBox = document.getElementById('custom-alert');

    alertBox.textContent = message;
    alertBox.classList.add('show');

    setTimeout(() => {
        alertBox.classList.remove('show');
    }, 3000);
}

// FORM TOGGLE
const loginBtn = document.getElementById('login-btn');
const registerBtn = document.getElementById('register-btn');

const loginForm = document.getElementById('login-form');
const registerForm = document.getElementById('register-form');

loginBtn.addEventListener('click', () => {
    loginBtn.classList.add('active');
    registerBtn.classList.remove('active');

    loginForm.classList.add('active');
    registerForm.classList.remove('active');
});

registerBtn.addEventListener('click', () => {
    registerBtn.classList.add('active');
    loginBtn.classList.remove('active');

    registerForm.classList.add('active');
    loginForm.classList.remove('active');
});

// CHECK IF PLAN IS CHOSEN
function investmentPlanChosen(){
    const selectedPlan = document.getElementById('plan').value;

    if(selectedPlan === ''){
        showAlert('Choose an Investment plan.');
        return false;
    }

    return true;
}

// LOGIN SUBMIT
loginForm.addEventListener('submit', (e) => {
    e.preventDefault();

    const email = document.getElementById('login-email').value.trim();
    const password = document.getElementById('login-password').value.trim();

    if(email === '' || password === ''){
        showAlert('Please fill in all login fields.');
        return;
    }

    if(!investmentPlanChosen()){
        return;
    }

    window.location.href = "invest.html";
});

// REGISTER SUBMIT
registerForm.addEventListener('submit', (e) => {
    e.preventDefault();

    const name = document.getElementById('register-name').value.trim();
    const email = document.getElementById('register-email').value.trim();
    const password = document.getElementById('register-password').value.trim();

    if(name === '' || email === '' || password === ''){
        showAlert('Please fill in all registration fields.');
        return;
    }

    if(!investmentPlanChosen()){
        return;
    }

    window.location.href = "invest.html";
});

// CALCULATE RETURNS
function calculateReturn(){

    const plan = parseInt(document.getElementById('plan').value);

    const amount = parseFloat(document.getElementById('amount').value);

    const resultDiv = document.getElementById('return-result');

    if(isNaN(amount) || amount <= 0){
        resultDiv.textContent = "Please enter a valid amount.";
        return;
    }

    let valid = false;

    if(plan === 30 && amount >= 500 && amount <= 1000){
        valid = true;
    }

    else if(plan === 25 && amount >= 2000 && amount <= 10000){
        valid = true;
    }

    else if(plan === 20 && amount >= 10000){
        valid = true;
    }

    if(!valid){
        resultDiv.textContent = "Amount does not match the selected plan range.";
        return;
    }

    const returnAmount = amount + (amount * plan / 100);

    resultDiv.textContent = `Your return will be: Ksh ${returnAmount.toFixed(2)}`;
}

</script>

</body>
</html>
